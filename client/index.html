<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRECYCLE — Precast Cycle Intelligence Engine</title>
  </head>
  <body>
    <div id="root">
      <div style="padding:24px;color:#94a3b8;font-family:system-ui;min-height:100vh;background:#0f1419;">
        Loading PRECYCLE…
      </div>
    </div>
    <script type="module">
      window.__PRECYCLE_ERROR__ = function(msg, stack) {
        var root = document.getElementById('root');
        if (root) root.innerHTML = '<div style="padding:24px;background:#1a1f26;color:#e2e8f0;font-family:system-ui;min-height:100vh;"><h1 style="color:#f59e0b;">Load error</h1><pre style="background:#0f1419;padding:16px;border-radius:8px;overflow:auto;white-space:pre-wrap;">' + (msg || '') + '\n\n' + (stack || '') + '</pre></div>';
      };
      window.addEventListener('error', function(e) {
        if (e.message) window.__PRECYCLE_ERROR__(e.message, (e.filename || '') + ':' + (e.lineno || ''));
      });
      window.addEventListener('unhandledrejection', function(e) {
        var r = e.reason;
        var msg = r && (r.message || r.error && r.error.message || String(r));
        var stack = r && (r.stack || r.error && r.error.stack);
        window.__PRECYCLE_ERROR__(msg || 'Unhandled promise rejection', stack);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
